<body data-page="prompts">
  <header id="site-header"></header>

  <main id="main">
    <section class="section">
      <div class="container">
        <div id="cat-head"></div>
        <div id="prompt-list"><div class="loading">読み込み中…</div></div>
      </div>
    </section>

    <section class="cta-band">
      <div class="container">
        <h2>使ってみたら、ぜひ感想を。</h2>

      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/crypto.js"></script>
  <script src="assets/js/category.js"></script>
  <script>
    CoAX.getConfig().then(cfg => {
      const el = document.getElementById("cta-line");
      if (el) el.href = cfg.lineFormUrl;
    });
  </script>
